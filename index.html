<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Useless Chair Spawner v2.0</title>
    <style>
        /* Base e testo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #444;
            pointer-events: none;
            z-index: 10;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        p { font-size: 14px; color: #888; margin-top: 0; }

        /* Lo stile della nostra SEDIA REALE */
        .chair {
            position: absolute;
            /* Definiamo le dimensioni dell'immagine */
            width: 100px;
            height: auto; /* Mantiene le proporzioni */
            
            cursor: pointer;
            
            /* Il punto di inserimento deve essere il fondo della sedia, */
            /* non il centro, per farla "poggiare" sul pavimento del tocco. */
            transform: translate(-50%, -100%); 
            
            /* Animazioni */
            animation: spawnReal 0.2s ease-out;
            transition: transform 0.1s ease;
        }

        /* L'animazione di comparsa */
        @keyframes spawnReal {
            0% { transform: translate(-50%, -100%) scale(0) rotate(10deg); opacity: 0; }
            100% { transform: translate(-50%, -100%) scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h1>CHAIR ZONE</h1>
        <p>TAP TO PLACE A REALISTIC CHAIR / TAP A CHAIR TO REMOVE</p>
    </div>

    <script>
        // L'URL dell'immagine realistica (una sedia di design pulita)
        // Usiamo un'immagine con sfondo trasparente (PNG)
        const chairImageUrl = 'https://i.imgur.com/83pZpG1.png';

        document.addEventListener('click', function(event) {
            
            // CONTROLLO: Se clicco su una sedia, non ne creo un'altra
            if (event.target.classList.contains('chair')) {
                return;
            }

            // 1. Ottieni le coordinate (x è orizzontale, y è verticale)
            const x = event.clientX;
            const y = event.clientY;

            // 2. Crea un elemento immagine (<img>)
            const newChairImg = document.createElement('img');
            newChairImg.classList.add('chair');
            newChairImg.src = chairImageUrl; // Assegna l'URL della sedia
            newChairImg.alt = 'A realistic chair';

            // 3. Posiziona la sedia
            newChairImg.style.left = x + 'px';
            newChairImg.style.top = y + 'px';

            // 4. FUNZIONE SPARIZIONE
            newChairImg.addEventListener('click', function(chairEvent) {
                chairEvent.stopPropagation();
                newChairImg.remove();
            });

            // 5. Appendi l'immagine alla pagina
            document.body.appendChild(newChairImg);
        });
    </script>

</body>
</html>
